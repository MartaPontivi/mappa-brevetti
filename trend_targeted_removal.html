
<h2 class="sr-only">Grafico interattivo: evoluzione temporale brevetti targeted removal plastic particles, 1958–2025</h2>

<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center;">
  <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--color-text-secondary);">
    <label for="yearFrom">Dal</label>
    <select id="yearFrom" style="font-size:12px;padding:4px 8px;"></select>
    <label for="yearTo">al</label>
    <select id="yearTo" style="font-size:12px;padding:4px 8px;"></select>
  </div>
  <div style="display:flex;gap:6px;margin-left:auto;">
    <button onclick="setRange(1958,2025)" style="font-size:11px;padding:4px 10px;">Tutto</button>
    <button onclick="setRange(1990,2025)" style="font-size:11px;padding:4px 10px;">1990–2025</button>
    <button onclick="setRange(2010,2025)" style="font-size:11px;padding:4px 10px;">2010–2025</button>
  </div>
</div>

<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;">
  <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px;">
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;">Totale periodo</div>
    <div id="statTotal" style="font-size:22px;font-weight:500;color:var(--color-text-primary);">—</div>
  </div>
  <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px;">
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;">Anno di picco</div>
    <div id="statPeak" style="font-size:22px;font-weight:500;color:var(--color-text-primary);">—</div>
  </div>
  <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px;">
    <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:4px;">Media annua</div>
    <div id="statAvg" style="font-size:22px;font-weight:500;color:var(--color-text-primary);">—</div>
  </div>
</div>

<div style="position:relative;width:100%;height:300px;">
  <canvas id="trendChart" role="img" aria-label="Grafico interattivo evoluzione temporale brevetti targeted removal.">Evoluzione temporale documenti brevettuali targeted removal plastic particles.</canvas>
</div>
<div style="text-align:center;font-size:12px;color:var(--color-text-secondary);margin-top:8px;">Anno di prima pubblicazione</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const raw = {
  1958:2,1960:1,1961:1,1965:2,1967:1,1968:2,1969:1,1970:6,1971:5,1972:9,
  1973:9,1974:10,1975:3,1976:4,1977:6,1978:3,1979:7,1980:10,1981:13,1982:6,
  1983:4,1984:2,1985:1,1986:1,1987:1,1988:2,1989:1,1990:5,1991:6,1992:7,
  1993:4,1994:6,1996:4,1997:3,1998:7,1999:5,2000:2,2001:15,2002:12,2003:3,
  2004:14,2005:15,2006:17,2007:14,2008:13,2009:11,2010:10,2011:21,2012:33,
  2013:30,2014:37,2015:39,2016:50,2017:68,2018:119,2019:181,2020:267,
  2021:353,2022:396,2023:407,2024:455,2025:466
};

const MIN = 1958, MAX = 2025;
const allYears = [];
for (let y = MIN; y <= MAX; y++) allYears.push(y);
const allValues = allYears.map(y => raw[y] ?? 0);

const selFrom = document.getElementById('yearFrom');
const selTo   = document.getElementById('yearTo');
allYears.forEach(y => {
  selFrom.innerHTML += `<option value="${y}">${y}</option>`;
  selTo.innerHTML   += `<option value="${y}">${y}</option>`;
});
selFrom.value = MIN;
selTo.value   = MAX;

const chart = new Chart(document.getElementById('trendChart'), {
  type: 'line',
  data: {
    labels: allYears,
    datasets: [{
      data: allValues,
      borderColor: '#2563eb',
      borderWidth: 2,
      pointRadius: 0,
      pointHoverRadius: 6,
      pointHoverBackgroundColor: '#ffffff',
      pointHoverBorderColor: '#2563eb',
      pointHoverBorderWidth: 2,
      fill: true,
      backgroundColor: 'rgba(219,234,254,0.45)',
      tension: 0.3
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    plugins: {
      legend: { display: false },
      tooltip: {
        enabled: true,
        backgroundColor: 'rgba(255,255,255,0.97)',
        borderColor: 'rgba(0,0,0,0.12)',
        borderWidth: 1,
        titleColor: '#0f172a',
        bodyColor: '#1d4ed8',
        titleFont: { size: 12, weight: '600' },
        bodyFont: { size: 13, weight: '500' },
        padding: 10,
        displayColors: false,
        callbacks: {
          title: ctx => 'Anno ' + ctx[0].label,
          label: ctx => ctx.parsed.y + ' brevetti'
        }
      }
    },
    scales: {
      x: {
        grid: { color: 'rgba(0,0,0,0.06)' },
        ticks: { color: '#64748b', font: { size: 11 }, autoSkip: true, maxTicksLimit: 14, maxRotation: 0 },
        border: { display: false }
      },
      y: {
        min: 0,
        grid: { color: 'rgba(0,0,0,0.06)' },
        ticks: { color: '#64748b', font: { size: 11 }, stepSize: 50 },
        border: { display: false },
        title: { display: true, text: 'Numero di documenti', color: '#64748b', font: { size: 11 } }
      }
    }
  }
});

function updateStats(years, values) {
  const total = values.reduce((a,b) => a+b, 0);
  const max = Math.max(...values);
  const peakYear = years[values.indexOf(max)];
  const avg = total / years.length;
  document.getElementById('statTotal').textContent = total.toLocaleString('it-IT');
  document.getElementById('statPeak').textContent = peakYear + ' (' + max + ')';
  document.getElementById('statAvg').textContent = avg.toFixed(1);
}

function updateChart() {
  const from = parseInt(selFrom.value);
  const to   = parseInt(selTo.value);
  if (from > to) return;
  const filtYears  = allYears.filter(y => y >= from && y <= to);
  const filtValues = filtYears.map(y => raw[y] ?? 0);
  chart.data.labels = filtYears;
  chart.data.datasets[0].data = filtValues;
  chart.update();
  updateStats(filtYears, filtValues);
}

function setRange(from, to) {
  selFrom.value = from;
  selTo.value   = to;
  updateChart();
}

selFrom.addEventListener('change', updateChart);
selTo.addEventListener('change', updateChart);
updateChart();
</script>
